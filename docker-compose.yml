version: "3.9"

services:
  scheduler:
    build: .
    container_name: aps-scheduler
    ports:
      - "5000:5000"
    volumes:
      - ./scripts:/app/scripts
      - scheduler_data:/app/instance
    environment:
      - DATABASE_URI=sqlite:////app/instance/scheduler.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  scheduler_data:
